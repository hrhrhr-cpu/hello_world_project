<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪食蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }

        h1 {
            margin-bottom: 16px;
            font-size: 2.2rem;
            letter-spacing: 4px;
            text-shadow: 0 0 12px rgba(0, 255, 136, 0.5);
        }

        .info {
            display: flex;
            gap: 32px;
            margin-bottom: 16px;
            font-size: 1.1rem;
        }

        .info span {
            color: #00ff88;
        }

        canvas {
            border: 3px solid #00ff88;
            border-radius: 8px;
            box-shadow: 0 0 24px rgba(0, 255, 136, 0.25);
            background: #0f0f1a;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        button {
            padding: 10px 28px;
            font-size: 1rem;
            color: #1a1a2e;
            background: #00ff88;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        button:hover {
            background: #00cc6a;
            transform: scale(1.05);
        }

        .tips {
            margin-top: 8px;
            color: #8892b0;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <h1>贪食蛇</h1>
    <div class="info">
        <div>得分: <span id="score">0</span></div>
        <div>最高分: <span id="highScore">0</span></div>
    </div>
    <canvas id="game" width="400" height="400"></canvas>
    <div class="controls">
        <button id="startBtn">开始游戏</button>
        <div class="tips">使用方向键 ↑ ↓ ← → 控制蛇的移动</div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const startBtn = document.getElementById('startBtn');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let direction = { x: 0, y: 0 };
        let nextDirection = { x: 0, y: 0 };
        let food = { x: 0, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameInterval = null;
        let speed = 120;

        highScoreEl.textContent = highScore;

        function init() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            speed = 120;
            scoreEl.textContent = score;
            placeFood();
        }

        function placeFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }

        function update() {
            direction = { ...nextDirection };

            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            if (
                head.x < 0 || head.x >= tileCount ||
                head.y < 0 || head.y >= tileCount ||
                snake.some(segment => segment.x === head.x && segment.y === head.y)
            ) {
                gameOver();
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                if (score > highScore) {
                    highScore = score;
                    highScoreEl.textContent = highScore;
                    localStorage.setItem('snakeHighScore', highScore);
                }
                speed = Math.max(50, speed - 3);
                clearInterval(gameInterval);
                gameInterval = setInterval(gameLoop, speed);
                placeFood();
            } else {
                snake.pop();
            }
        }

        function draw() {
            ctx.fillStyle = '#0f0f1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制食物
            ctx.fillStyle = '#ff3366';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();

            // 绘制蛇
            snake.forEach((segment, index) => {
                ctx.fillStyle = index === 0 ? '#00ff88' : '#00cc6a';
                ctx.fillRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );
            });
        }

        function gameLoop() {
            update();
            draw();
        }

        function gameOver() {
            clearInterval(gameInterval);
            gameInterval = null;
            startBtn.textContent = '重新开始';

            ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#ff3366';
            ctx.font = 'bold 36px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('游戏结束', canvas.width / 2, canvas.height / 2 - 20);

            ctx.fillStyle = '#fff';
            ctx.font = '20px sans-serif';
            ctx.fillText(`最终得分: ${score}`, canvas.width / 2, canvas.height / 2 + 20);
        }

        function startGame() {
            if (gameInterval) {
                clearInterval(gameInterval);
            }
            init();
            gameInterval = setInterval(gameLoop, speed);
            startBtn.textContent = '重新开始';
        }

        document.addEventListener('keydown', (e) => {
            if (!gameInterval) return;

            switch (e.key) {
                case 'ArrowUp':
                    if (direction.y === 0) nextDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                    if (direction.y === 0) nextDirection = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                    if (direction.x === 0) nextDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                    if (direction.x === 0) nextDirection = { x: 1, y: 0 };
                    break;
            }
        });

        startBtn.addEventListener('click', startGame);

        // 初始画面
        ctx.fillStyle = '#0f0f1a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#00ff88';
        ctx.font = '20px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('点击“开始游戏”', canvas.width / 2, canvas.height / 2);
    </script>
</body>
</html>
